site_name: Strike7 Documentation
site_description: Official documentation for Strike7 platform
site_author: Strike7 Security
site_url: https://docs.strike7.ai/

docs_dir: docs
site_dir: site

repo_name: Strike7ai/docs.strike7.ai
repo_url: https://github.com/Strike7ai/docs.strike7.ai
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
  palette:
    - scheme: slate
      primary: black
      accent: red
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: default
      primary: black
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - footnotes
  - meta
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true

nav:
  - Home: index.md
  - Overview: overview.md
  - Platform:
      - Agents: agents/index.md
      - Skills: skills/index.md
  - Security:
      - CVEs: cves/index.md
  - About:
      - GitHub Repo: https://github.com/Strike7ai/docs.strike7.ai

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Strike7ai
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/company/strike7
